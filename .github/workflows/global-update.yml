name: Global Profile Sync (Pull Model)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Profile Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Fetch Latest Activity and Update README
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          LATEST_REPO=$(gh repo list psycho237-prog --limit 5 \
            --json name,updatedAt,url \
            --jq '[.[] | select(.name != "psycho237-prog")] | sort_by(.updatedAt) | reverse | .[0]')

          REPO_NAME=$(echo "$LATEST_REPO" | jq -r '.name')
          REPO_URL=$(echo "$LATEST_REPO"  | jq -r '.url')
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M')

          if [ -z "$REPO_NAME" ] || [ "$REPO_NAME" = "null" ]; then
            echo "No recent repository found."
            exit 0
          fi

          echo "Latest repo: $REPO_NAME ($REPO_URL)"

          sed -i "s|\*\*Brain\*\* | 🧠 .*|\*\*Brain\*\* | 🧠 Mastering 3D Web Experiences (Last Pull: $TIMESTAMP) ||" README.md
          sed -i "s|\*\*Current Project\*\* | .*|\*\*Current Project\*\* | 🚀 [$REPO_NAME]($REPO_URL) ||" README.md

          git add README.md
          git diff --staged --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "Automated Profile Sync: Newest activity detected in $REPO_NAME"
          git push origin main

      - name: Notify via WhatsApp
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          LATEST_REPO=$(gh repo list psycho237-prog --limit 5 \
            --json name,updatedAt \
            --jq '[.[] | select(.name != "psycho237-prog")] | sort_by(.updatedAt) | reverse | .[0].name')

          MESSAGE="✅ *Profile Synced*\nLatest activity detected in: *$LATEST_REPO*"
          JSON_CONTENT=$(printf '{"message": "%s"}' "$MESSAGE")
          B64_CONTENT=$(echo -n "$JSON_CONTENT" | base64 | tr -d '\n')

          gh api --method PUT \
            /repos/psycho237-prog/perpetual-node-relay/contents/notifications/notif-profile-$(date +%s).json \
            -f message="WhatsApp Notify" \
            -f content="$B64_CONTENT"
